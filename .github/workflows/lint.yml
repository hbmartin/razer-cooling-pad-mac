# Lint runs entirely on Linux: rustfmt is platform-independent and clippy
# covers every module the Linux target compiles (macOS-only code is linted
# by the self-hosted macOS job in ci.yml).
name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install libudev (hidapi build dependency)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy --all-targets --locked -- -D warnings
