# Coverage-guided fuzzing of the parsing surfaces (see fuzz/). A short
# smoke run per target: enough to catch a panic regression, cheap enough
# to run weekly. The property tests in tests/properties.rs cover the same
# functions on every `cargo test`.
name: Fuzz

on:
  schedule:
    - cron: "20 6 * * 1" # weekly, Monday morning UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: fuzz (smoke run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install libudev (hidapi build dependency)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}
      - name: Fuzz each target briefly
        run: |
          for target in $(cargo fuzz list); do
            echo "::group::$target"
            cargo fuzz run "$target" -- -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done
